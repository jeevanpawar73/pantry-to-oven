<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pantry-to-Oven — Smart Baking System</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .splash {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--sp-6);
      background: var(--cream);
      background-image:
        radial-gradient(ellipse at 15% 15%, rgba(232,116,58,0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(212,136,10,0.08) 0%, transparent 55%);
    }

    .splash-logo {
      width: 72px;
      height: 72px;
      background: var(--brown);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto var(--sp-5);
      box-shadow: var(--shadow-md);
      animation: popIn 0.5s var(--ease) both;
    }

    .splash-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      color: var(--brown-deep);
      margin-bottom: var(--sp-2);
      animation: fadeInUp 0.5s var(--ease) 0.1s both;
    }

    .splash-sub {
      font-size: 1rem;
      color: var(--gray-400);
      margin-bottom: var(--sp-8);
      animation: fadeInUp 0.5s var(--ease) 0.2s both;
    }

    .splash-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--cream-border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto var(--sp-4);
    }

    .splash-loading {
      font-size: 0.82rem;
      color: var(--gray-400);
      animation: fadeInUp 0.4s var(--ease) 0.3s both;
    }

    .splash-actions {
      display: flex;
      gap: var(--sp-3);
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.5s var(--ease) 0.3s both;
      display: none;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash-logo">🧁</div>
    <h1 class="splash-title">Pantry-to-Oven</h1>
    <p class="splash-sub">Your Smart Baking Companion</p>

    <div class="splash-spinner" id="spinner"></div>
    <p class="splash-loading" id="loading-text">Loading...</p>

    <!-- Fallback buttons shown if redirect takes too long -->
    <div class="splash-actions" id="fallback-actions">
      <a href="login.html"    class="btn btn-primary btn-lg">Sign In</a>
      <a href="register.html" class="btn btn-secondary btn-lg">Create Account</a>
    </div>
  </div>

<script src="js/storage.js"></script>
<script src="js/data.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initSeedData();

    /* Slight delay so the splash feels intentional, not broken */
    setTimeout(() => {
      const session = getSession();

      if (session) {
        if (session.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'home.html';
        }
      } else {
        window.location.href = 'login.html';
      }
    }, 600);

    /* Fallback — if redirect somehow stalls, show manual buttons */
    setTimeout(() => {
      document.getElementById('spinner').style.display      = 'none';
      document.getElementById('loading-text').style.display = 'none';
      document.getElementById('fallback-actions').style.display = 'flex';
    }, 3000);
  });
</script>
</body>
</html>
