<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Pantry-to-Oven</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    .auth-card { animation: fadeInUp 0.5s var(--ease) both; }

    .password-wrapper {
      position: relative;
    }
    .password-wrapper .form-input {
      padding-right: 44px;
    }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      color: var(--gray-400);
      padding: 2px;
      transition: color var(--t-fast) var(--ease);
    }
    .password-toggle:hover { color: var(--brown); }

    .admin-hint {
      margin-top: var(--sp-5);
      padding: var(--sp-3) var(--sp-4);
      background: var(--amber-pale);
      border: 1px solid rgba(212,136,10,0.25);
      border-radius: var(--r-md);
      font-size: 0.78rem;
      color: var(--amber);
      text-align: center;
      line-height: 1.5;
    }

    .brand-full {
      text-align: center;
    }
    .brand-full .navbar-brand-text {
      font-size: 1.5rem;
      display: block;
    }
    .brand-full .navbar-brand-sub {
      font-size: 0.7rem;
    }

    .divider-or {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      margin: var(--sp-4) 0;
      color: var(--gray-400);
      font-size: 0.8rem;
    }
    .divider-or::before,
    .divider-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--cream-border);
    }
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">🧁</div>
      <div class="brand-full">
        <span class="navbar-brand-text">Pantry-to-Oven</span>
        <span class="navbar-brand-sub">Smart Baking System</span>
      </div>
    </div>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to your baking account</p>

    <!-- Login Form -->
    <form id="login-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="login-username">Username</label>
        <div class="form-input-icon">
          <span class="input-icon">👤</span>
          <input
            type="text"
            id="login-username"
            class="form-input"
            placeholder="Enter your username"
            autocomplete="username"
            autofocus
          />
        </div>
        <span class="form-error" id="username-error"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="login-password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="password-toggle"
            onclick="togglePasswordVisibility('login-password', this)"
            aria-label="Toggle password visibility"
          >👁</button>
        </div>
        <span class="form-error" id="password-error"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
        Sign In
      </button>

    </form>

    <!-- Admin hint -->
    <div class="admin-hint">
      Admin access: use <strong>admin</strong> / <strong>admin123</strong>
    </div>

    <div class="auth-footer">
      New to Pantry-to-Oven?
      <a href="register.html">Create an account</a>
    </div>

  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initSeedData();

    /* Redirect if already logged in */
    requireGuest();

    document.getElementById('login-form')
      .addEventListener('submit', handleLogin);

    /* Allow Enter key on username to move to password */
    document.getElementById('login-username')
      .addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('login-password').focus();
        }
      });
  });
</script>
</body>
</html>
