<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Pantry-to-Oven</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    .auth-card { animation: fadeInUp 0.5s var(--ease) both; }

    .password-wrapper {
      position: relative;
    }
    .password-wrapper .form-input {
      padding-right: 44px;
    }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      color: var(--gray-400);
      padding: 2px;
      transition: color var(--t-fast) var(--ease);
    }
    .password-toggle:hover { color: var(--brown); }

    .strength-bar {
      height: 4px;
      background: var(--cream-border);
      border-radius: var(--r-full);
      margin-top: var(--sp-2);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: var(--r-full);
      transition: width 0.3s var(--ease), background 0.3s var(--ease);
      width: 0%;
    }
    .strength-label {
      font-size: 0.72rem;
      margin-top: 3px;
      font-weight: 600;
    }

    .brand-full { text-align: center; }
    .brand-full .navbar-brand-text { font-size: 1.5rem; display: block; }
    .brand-full .navbar-brand-sub  { font-size: 0.7rem; }

    /* Slightly taller card for register */
    .auth-card { max-width: 440px; }

    .input-valid-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity var(--t-fast) var(--ease);
    }
    .input-valid-icon.show { opacity: 1; }
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">🧁</div>
      <div class="brand-full">
        <span class="navbar-brand-text">Pantry-to-Oven</span>
        <span class="navbar-brand-sub">Smart Baking System</span>
      </div>
    </div>

    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Join the baking community today</p>

    <!-- Register Form -->
    <form id="register-form" novalidate>

      <!-- Username -->
      <div class="form-group">
        <label class="form-label" for="reg-username">Username</label>
        <div class="form-input-icon" style="position:relative;">
          <span class="input-icon">👤</span>
          <input
            type="text"
            id="reg-username"
            class="form-input"
            placeholder="Choose a username"
            autocomplete="username"
            autofocus
            minlength="3"
          />
          <span class="input-valid-icon" id="username-valid-icon">✅</span>
        </div>
        <span class="form-error" id="reg-username-error"></span>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="reg-email">Email address</label>
        <div class="form-input-icon" style="position:relative;">
          <span class="input-icon">✉️</span>
          <input
            type="email"
            id="reg-email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
          />
          <span class="input-valid-icon" id="email-valid-icon">✅</span>
        </div>
        <span class="form-error" id="reg-email-error"></span>
        <span class="form-hint">Used for account recovery in future updates.</span>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="reg-password"
            class="form-input"
            placeholder="At least 6 characters"
            autocomplete="new-password"
          />
          <button
            type="button"
            class="password-toggle"
            onclick="togglePasswordVisibility('reg-password', this)"
            aria-label="Toggle password visibility"
          >👁</button>
        </div>
        <!-- Strength indicator -->
        <div class="strength-bar">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
        <span class="strength-label" id="strength-label" style="color:var(--gray-400)"></span>
        <span class="form-error" id="reg-password-error"></span>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label" for="reg-confirm">Confirm password</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="reg-confirm"
            class="form-input"
            placeholder="Re-enter your password"
            autocomplete="new-password"
          />
          <button
            type="button"
            class="password-toggle"
            onclick="togglePasswordVisibility('reg-confirm', this)"
            aria-label="Toggle confirm password visibility"
          >👁</button>
        </div>
        <span class="form-error" id="reg-confirm-error"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-btn">
        Create Account
      </button>

    </form>

    <div class="auth-footer">
      Already have an account?
      <a href="login.html">Sign in</a>
    </div>

  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initSeedData();
    requireGuest();

    document.getElementById('register-form')
      .addEventListener('submit', handleRegister);

    /* ── Live password strength indicator ── */
    const passwordInput = document.getElementById('reg-password');
    const strengthFill  = document.getElementById('strength-fill');
    const strengthLabel = document.getElementById('strength-label');

    passwordInput.addEventListener('input', () => {
      const val = passwordInput.value;
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { pct: '0%',   color: 'var(--cream-border)', label: '' },
        { pct: '25%',  color: 'var(--error)',         label: 'Weak' },
        { pct: '50%',  color: 'var(--amber)',          label: 'Fair' },
        { pct: '75%',  color: 'var(--orange)',         label: 'Good' },
        { pct: '100%', color: 'var(--success)',        label: 'Strong' },
      ];

      const level = levels[Math.min(score, 4)];
      strengthFill.style.width      = level.pct;
      strengthFill.style.background = level.color;
      strengthLabel.textContent     = level.label;
      strengthLabel.style.color     = level.color;
    });

    /* ── Live username availability check ── */
    const usernameInput    = document.getElementById('reg-username');
    const usernameValidIcon = document.getElementById('username-valid-icon');

    usernameInput.addEventListener('input', () => {
      const val = usernameInput.value.trim();
      if (val.length < 3) {
        usernameValidIcon.classList.remove('show');
        return;
      }
      const taken = getUserByUsername(val) || val.toLowerCase() === 'admin';
      usernameValidIcon.textContent = taken ? '❌' : '✅';
      usernameValidIcon.classList.add('show');
    });

    /* ── Live email validation ── */
    const emailInput    = document.getElementById('reg-email');
    const emailValidIcon = document.getElementById('email-valid-icon');

    emailInput.addEventListener('input', () => {
      const valid = emailInput.value.includes('@') && emailInput.value.includes('.');
      emailValidIcon.classList.toggle('show', valid);
    });

    /* ── Live confirm-password match ── */
    document.getElementById('reg-confirm').addEventListener('input', () => {
      const pw  = passwordInput.value;
      const cfm = document.getElementById('reg-confirm').value;
      const err = document.getElementById('reg-confirm-error');
      if (cfm && pw !== cfm) {
        err.textContent = 'Passwords do not match.';
        err.classList.add('visible');
      } else {
        err.textContent = '';
        err.classList.remove('visible');
      }
    });
  });
</script>
</body>
</html>
